version: "3.8"

services:

  # ─────────────────────────────────
  # Zookeeper (required for Kafka)
  # ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    mem_limit: 256m
    networks:
      - kafka-net


  # ─────────────────────────────────
  # Kafka Broker (Single Node)
  # ─────────────────────────────────
  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    hostname: kafka1
    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Listeners (IMPORTANT: keep simple for EC2)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Stability settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Memory fix (CRITICAL for EC2)
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx512m"

    mem_limit: 768m

    depends_on:
      - zookeeper

    networks:
      - kafka-net


  # ─────────────────────────────────
  # ClickHouse (Log Storage)
  # ─────────────────────────────────
  clickhouse:
    build:
      context: .
      dockerfile: Dockerfile.clickhouse
    container_name: clickhouse

    ports:
      - "8123:8123"
      - "9000:9000"

    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    volumes:
      - clickhouse-data:/var/lib/clickhouse

    depends_on:
      - kafka1

    networks:
      - kafka-net


  # ─────────────────────────────────
  # Node.js Server (Producer + Consumer)
  # ─────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: cluster/Dockerfile
    container_name: log-server

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - kafka1
      - clickhouse

    restart: on-failure

    networks:
      - kafka-net


# ─────────────────────────────────
# Network
# ─────────────────────────────────
networks:
  kafka-net:
    driver: bridge


# ─────────────────────────────────
# Persistent Storage
# ─────────────────────────────────
volumes:
  clickhouse-data: